<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noxcent Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { --bg:#050810; --card:#0b1120; --blue:#00b4ff; --border:rgba(0,180,255,0.2); --text:#c8dff0; --danger:#ff3d3d; }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani', sans-serif; }
  body { background:var(--bg); color:var(--text); min-height:100vh; display:flex; justify-content:center; align-items:center; }
  
  /* Login Screen */
  #loginScreen { background:var(--card); border:1px solid var(--border); padding:40px; border-radius:8px; width:100%; max-width:400px; text-align:center; box-shadow:0 0 40px rgba(0,180,255,0.1); }
  .title { font-family:'Orbitron'; color:#fff; font-size:1.4rem; margin-bottom:20px; letter-spacing:2px; }
  .title span { color:var(--blue); }
  input { width:100%; background:#080d1a; border:1px solid var(--border); color:#fff; padding:12px; font-family:'Share Tech Mono'; font-size:1.1rem; border-radius:4px; margin-bottom:20px; outline:none; text-align:center; }
  button { width:100%; background:var(--blue); color:#000; font-family:'Orbitron'; font-weight:900; padding:14px; border:none; border-radius:4px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; }
  
  /* Main Panel */
  #mainPanel { display:none; width:100%; max-width:800px; background:var(--card); border:1px solid var(--border); padding:30px; border-radius:8px; margin:20px; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; color:var(--blue); font-family:'Orbitron'; font-size:0.8rem; margin-bottom:8px; letter-spacing:1px; }
  .form-input { text-align:left; font-family:inherit; }
  .link-list { margin-top:30px; border-top:1px solid var(--border); padding-top:20px; }
  .link-item { background:#080d1a; padding:15px; border-radius:4px; margin-bottom:10px; display:flex; justify-content:between; align-items:center; border:1px solid rgba(0,180,255,0.05); }
  .link-details { flex-grow:1; }
  .link-details h4 { color:#fff; font-family:'Orbitron'; font-size:1rem; }
  .link-details p { font-size:0.85rem; color:var(--blue); margin-top:4px; }
  .del-btn { background:rgba(255,61,61,0.1); color:var(--danger); border:1px solid rgba(255,61,61,0.3); padding:6px 12px; font-size:0.8rem; border-radius:3px; cursor:pointer; width:auto; display:inline-block; }
</style>
</head>
<body>

<!-- LOGIN FORM -->
<div id="loginScreen">
  <h2 class="title">NOXCENT <span>PANEL</span></h2>
  <input type="password" id="passCode" placeholder="ENTER SECRET PASSWORD">
  <button onclick="verifyPass()">Login</button>
  <p id="err" style="color:var(--danger); margin-top:15px; display:none; font-size:0.9rem;">Access Denied! Wrong Password.</p>
</div>

<!-- MANAGEMENT PANEL -->
<div id="mainPanel">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
    <h2 class="title" style="margin:0;">LINK <span>MANAGER</span></h2>
    <button onclick="logout()" class="del-btn" style="width:auto; padding:6px 15px;">Logout</button>
  </div>
  
  <div class="form-group">
    <label>Custom Link ID (e.g., gta6-mod, sub-money)</label>
    <input type="text" id="linkId" class="form-input" placeholder="gta6-graphics">
  </div>
  <div class="form-group">
    <label>Article Title (This shows on the landing page)</label>
    <input type="text" id="artTitle" class="form-input" placeholder="GTA 6 Ultra Graphics Mod Pack v1.2">
  </div>
  <div class="form-group">
    <label>Destination URL (Where user goes at the end)</label>
    <input type="url" id="destUrl" class="form-input" placeholder="https://www.mediafire.com/file/yourfile">
  </div>
  <button onclick="createShortLink()">Generate Short Link</button>

  <div class="link-list">
    <h3 style="font-family:'Orbitron'; color:#fff; margin-bottom:15px; font-size:1.1rem;">Your Active Short Links:</h3>
    <div id="container"></div>
  </div>
</div>

<script>
  // Auth Check
  if(localStorage.getItem('noxcent_auth') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    renderLinks();
  }

  function verifyPass() {
    if(document.getElementById('passCode').value === 'admin123') { // Aapka Password
      localStorage.setItem('noxcent_auth', 'true');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
      renderLinks();
    } else {
      document.getElementById('err').style.display = 'block';
    }
  }

  function logout() {
    localStorage.removeItem('noxcent_auth');
    location.reload();
  }

  // Core Logic
  function createShortLink() {
    const id = document.getElementById('linkId').value.trim().replace(/[^a-zA-Z0-9-_]/g, '');
    const title = document.getElementById('artTitle').value.trim();
    const dest = document.getElementById('destUrl').value.trim();

    if(!id || !title || !dest) return alert('Kindly fill all boxes!');

    const database = JSON.parse(localStorage.getItem('noxcent_db') || '{}');
    database[id] = { title: title, dest: dest };
    localStorage.setItem('noxcent_db', JSON.stringify(database));

    alert('Link created successfully!');
    document.getElementById('linkId').value = '';
    document.getElementById('artTitle').value = '';
    document.getElementById('destUrl').value = '';
    renderLinks();
  }

  function renderLinks() {
    const database = JSON.parse(localStorage.getItem('noxcent_db') || '{}');
    const container = document.getElementById('container');
    container.innerHTML = '';

    for(let id in database) {
      // Automatic current domain dynamic location linkage
      const shortUrl = window.location.href.replace('admin.html', '') + 'index.html?id=' + id;
      container.innerHTML += `
        <div class="link-item">
          <div class="link-details">
            <h4>${database[id].title}</h4>
            <p>Landing URL: <a href="${shortUrl}" target="_blank" style="color:var(--blue); font-family:'Share Tech Mono';">${shortUrl}</a></p>
          </div>
          <button class="del-btn" onclick="deleteLink('${id}')">Delete</button>
        </div>`;
    }
  }

  function deleteLink(id) {
    if(confirm('Are you sure you want to delete this link?')) {
      const database = JSON.parse(localStorage.getItem('noxcent_db') || '{}');
      delete database[id];
      localStorage.setItem('noxcent_db', JSON.stringify(database));
      renderLinks();
    }
  }
</script>
</body>
</html>
