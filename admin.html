<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Noxcent Mods</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050810; --dark: #080d1a; --card: #0b1120;
    --blue: #00b4ff; --blue2: #0077cc; --cyan: #00e5ff; --glow: rgba(0,180,255,0.35);
    --border: rgba(0,180,255,0.2); --border2: rgba(0,180,255,0.08);
    --text: #c8dff0; --muted: #5a7a99; --white: #e8f4ff;
    --green: #00e676; --danger: #ff3d3d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px; min-height:100vh; }

  #loginOverlay {
    position:fixed; inset:0; background: radial-gradient(ellipse at center, #0a1830 0%, #050810 70%);
    display:flex; align-items:center; justify-content:center; z-index:9999;
  }
  .login-box {
    background:var(--card); border:1px solid var(--border); border-top:3px solid var(--blue);
    padding:50px 44px; width:100%; max-width:420px; border-radius:6px; box-shadow:0 0 60px rgba(0,180,255,0.1);
  }
  .login-logo { text-align:center; margin-bottom:6px; }
  .login-name { font-family:'Orbitron',monospace; font-size:1.3rem; font-weight:900; color:var(--white); margin-top:12px; letter-spacing:2px; }
  .login-name span { color:var(--blue); }
  .login-input { width:100%; background:var(--dark); border:1px solid var(--border); color:var(--white); padding:14px 16px; font-family:'Share Tech Mono',monospace; font-size:1rem; border-radius:3px; outline:none; margin-bottom:24px; letter-spacing:4px; }
  .login-btn { width:100%; background:var(--blue); color:#000; border:none; padding:16px; font-family:'Orbitron',monospace; font-size:0.8rem; font-weight:700; letter-spacing:2px; cursor:pointer; border-radius:3px; }
  .login-error { background:rgba(255,61,61,0.1); border:1px solid rgba(255,61,61,0.3); color:var(--danger); padding:12px 16px; font-size:0.82rem; border-radius:3px; margin-top:16px; display:none; }

  #adminPanel { display:none; }
  header { background:rgba(5,8,16,0.98); border-bottom:1px solid var(--border); padding:14px 24px; backdrop-filter:blur(12px); }
  .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
  .h-name { font-family:'Orbitron',monospace; font-size:1.2rem; font-weight:900; color:var(--white); }
  .logout-btn { background:rgba(255,61,61,0.1); color:var(--danger); border:1px solid rgba(255,61,61,0.3); padding:8px 18px; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:3px; }
  
  .container { max-width:1100px; margin:0 auto; padding:40px 24px; }
  .link-manager { background:var(--card); border:1px solid var(--border2); padding:30px; border-radius:6px; margin-bottom:30px; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; font-size:0.75rem; letter-spacing:2px; text-transform:uppercase; color:var(--blue); margin-bottom:8px; font-family:'Orbitron',monospace; }
  .form-input { width:100%; background:var(--dark); border:1px solid var(--border2); color:var(--white); padding:12px 16px; border-radius:4px; outline:none; font-size:0.95rem; }
  .form-input:focus { border-color:var(--blue); }
  
  .action-btn { background:var(--blue); color:#000; font-family:'Orbitron',monospace; font-weight:700; letter-spacing:2px; padding:12px 24px; border:none; border-radius:4px; cursor:pointer; text-transform:uppercase; }
  .links-list { background:var(--card); border:1px solid var(--border2); padding:24px; border-radius:6px; }
  .link-item { display:flex; justify-content:space-between; align-items:center; padding:14px; border-bottom:1px solid var(--border2); }
  .link-info h4 { color:var(--white); font-family:'Orbitron',monospace; }
  .link-info p { color:var(--muted); font-size:0.85rem; }
  .del-btn { background:rgba(255,61,61,0.1); color:var(--danger); border:1px solid rgba(255,61,61,0.2); padding:6px 12px; cursor:pointer; border-radius:3px; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo"><h2 class="login-name">ADMIN<span> PANEL</span></h2></div>
    <label class="login-label">Enter Password</label>
    <input type="password" id="adminPass" class="login-input" placeholder="••••••">
    <button class="login-btn" onclick="checkLogin()">Access Panel</button>
    <div id="loginErr" class="login-error">Incorrect Password Access Denied!</div>
  </div>
</div>

<div id="adminPanel">
  <header>
    <div class="header-inner">
      <div class="h-name">NOXCENT<span> ADMIN</span></div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <div class="link-manager">
      <div class="form-group">
        <label>Article ID (e.g., article1, gta6-mod)</label>
        <input type="text" id="articleId" class="form-input" placeholder="gta6-mod">
      </div>
      <div class="form-group">
        <label>Article Title</label>
        <input type="text" id="articleTitle" class="form-input" placeholder="GTA 6 Ultra Graphics Mod v2.0">
      </div>
      <div class="form-group">
        <label>Destination URL (Final Link)</label>
        <input type="url" id="destUrl" class="form-input" placeholder="https://mediafire.com/file/xyz">
      </div>
      <button class="action-btn" onclick="saveLink()">Generate & Save Link</button>
    </div>

    <div class="links-list">
      <h3 style="color:var(--blue); font-family:'Orbitron'; margin-bottom:15px;">Generated Short Links</h3>
      <div id="linksContainer"></div>
    </div>
  </div>
</div>

<script>
  if(localStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadLinks();
  }

  function checkLogin() {
    const pass = document.getElementById('adminPass').value;
    if(pass === 'admin123') { // Password yahan badal sakte hain
      localStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadLinks();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  // Auto load function
  function logout() {
    localStorage.removeItem('adminLoggedIn');
    location.reload();
  }

  function saveLink() {
    const id = document.getElementById('articleId').value.trim();
    const title = document.getElementById('articleTitle').value.trim();
    const dest = document.getElementById('destUrl').value.trim();
    if(!id || !title || !dest) return alert('All fields are required!');

    const links = JSON.parse(localStorage.getItem('shortlinks') || '{}');
    links[id] = { title, dest };
    localStorage.setItem('shortlinks', JSON.stringify(links));
    
    alert('Link Shortened! URL is: redirect.html?id=' + id);
    loadLinks();
  }

  function loadLinks() {
    const links = JSON.parse(localStorage.getItem('shortlinks') || '{}');
    const container = document.getElementById('linksContainer');
    container.innerHTML = '';
    for(let id in links) {
      container.innerHTML += `
        <div class="link-item">
          <div class="link-info">
            <h4>${links[id].title} (ID: ${id})</h4>
            <p>Short Link: <a href="redirect.html?id=${id}" target="_blank" style="color:var(--blue)">redirect.html?id=${id}</a></p>
            <p>Destination: ${links[id].dest}</p>
          </div>
          <button class="del-btn" onclick="deleteLink('${id}')">Delete</button>
        </div>`;
    }
  }

  function deleteLink(id) {
    if(confirm('Are you sure?')) {
      const links = JSON.parse(localStorage.getItem('shortlinks') || '{}');
      delete links[id];
      localStorage.setItem('shortlinks', JSON.stringify(links));
      loadLinks();
    }
  }
</script>
</body>
</html>
