<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Noxcent Mods</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=400;600;700;900&family=Rajdhani:wght=400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #050810; --dark: #080d1a; --card: #0b1120;
    --blue: #00b4ff; --cyan: #00e5ff; --text: #c8dff0; --white: #e8f4ff;
    --green: #00e676; --danger: #ff3d3d; --border: rgba(0,180,255,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text); font-family:'Rajdhani', sans-serif; padding:40px 20px; }
  .admin-box { max-width:700px; margin:0 auto; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:30px; box-shadow:0 0 30px rgba(0,0,0,0.5); }
  h2 { font-family:'Orbitron'; color:var(--white); text-transform:uppercase; margin-bottom:20px; font-weight:700; font-size:1.6rem; text-align:center; }
  .form-group { margin-bottom:20px; }
  label { font-family:'Share Tech Mono'; display:block; color:var(--blue); margin-bottom:8px; text-transform:uppercase; font-size:0.9rem; }
  input { width:100%; padding:12px; background:var(--dark); border:1px solid var(--border); border-radius:4px; color:var(--white); font-family:'Rajdhani'; font-size:1.1rem; }
  input:focus { border-color:var(--cyan); outline:none; }
  .submit-btn { background:var(--blue); color:#000; font-family:'Orbitron'; font-weight:900; width:100%; padding:14px; border:none; border-radius:4px; cursor:pointer; text-transform:uppercase; font-size:1rem; letter-spacing:1px; transition:0.2s; }
  .submit-btn:hover { background:var(--cyan); }
  
  .links-list { margin-top:40px; border-top:1px dashed var(--border); padding-top:30px; }
  h3 { font-family:'Orbitron'; color:var(--cyan); text-transform:uppercase; font-size:1.2rem; margin-bottom:20px; }
  .link-item { background:var(--dark); border:1px solid rgba(0,180,255,0.1); padding:15px; border-radius:4px; margin-bottom:15px; display:flex; justify-content:between; align-items:center; }
  .link-info { flex-grow:1; }
  .link-info h4 { color:var(--white); font-size:1.2rem; margin-bottom:5px; }
  .link-info p { font-size:0.95rem; color:#8cb2d4; margin-bottom:3px; }
  .del-btn { background:rgba(255,61,61,0.1); border:1px solid var(--danger); color:var(--danger); font-family:'Share Tech Mono'; font-weight:bold; padding:8px 15px; border-radius:4px; cursor:pointer; text-transform:uppercase; transition:0.2s; height:fit-content; }
  .del-btn:hover { background:var(--danger); color:#000; }
</style>
</head>
<body>

<div class="admin-box">
  <h2>Noxcent Cloud Link Manager</h2>
  
  <div class="form-group">
    <label>Custom Link ID (e.g., pubgmod1)</label>
    <input type="text" id="articleId" placeholder="Enter unique custom id">
  </div>
  
  <div class="form-group">
    <label>File Title / Badge Text</label>
    <input type="text" id="articleTitle" placeholder="e.g., PUBG Mobile VIP Mod v2.9">
  </div>
  
  <div class="form-group">
    <label>Destination Target URL</label>
    <input type="url" id="destUrl" placeholder="https://mediafire.com/file-download-link">
  </div>
  
  <button class="submit-btn" onclick="createCloudLink()">Generate Cloud Link</button>
  
  <div class="links-list">
    <h3>Active Cloud Links Database</h3>
    <div id="linksContainer">Loading links from secure node...</div>
  </div>
</div>

<script>
  // === CONFIGURATION ===
  const SUPABASE_URL = "https://jsfmfpfdkkrsnkdxxznm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzZm1mcGZka2tyc25rZHh4em5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MzE0NjksImV4cCI6MjA5NjIwNzQ2OX0.0-L6ujQWp8Y_daufdJYed-euiblDkvN-52CgDK6TXDE";
  // =====================

  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Load active cloud links automatically
  async function loadLinks() {
    const container = document.getElementById('linksContainer');
    try {
      let { data, error } = await _supabase
        .from('noxcent_links')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;

      if(data.length === 0) {
        container.innerHTML = `<p style="color:var(--muted); font-family:'Share Tech Mono';">No links available in cloud database.</p>`;
        return;
      }

      container.innerHTML = '';
      data.forEach(link => {
        // Base landing page URL dynamically track karna
        const currentDomain = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
        const shortUrl = `${currentDomain}?id=${link.id}`;

        container.innerHTML += `
          <div class="link-item" style="display:flex; justify-content:space-between; align-items:center; gap:20px;">
            <div class="link-info">
              <h4>${link.title} <span style="color:var(--cyan); font-size:0.9rem;">(ID: ${link.id})</span></h4>
              <p>Short Link: <a href="${shortUrl}" target="_blank" style="color:var(--blue); word-break:break-all;">${shortUrl}</a></p>
              <p>Destination: <span style="color:#5a7a99; word-break:break-all;">${link.dest}</span></p>
            </div>
            <button class="del-btn" onclick="deleteCloudLink('${link.id}')">Delete</button>
          </div>`;
      });
    } catch (err) {
      container.innerHTML = `<p style="color:var(--danger)">Error loading data: ${err.message}</p>`;
    }
  }

  // Insert link into Supabase Cloud
  async function createCloudLink() {
    const id = document.getElementById('articleId').value.trim().toLowerCase();
    const title = document.getElementById('articleTitle').value.trim();
    const dest = document.getElementById('destUrl').value.trim();

    if(!id || !title || !dest) return alert('Bhai saare fields lazmi fill karo!');

    try {
      const { error } = await _supabase
        .from('noxcent_links')
        .insert([{ id, title, dest }]);

      if(error) {
        if(error.code === '23505') {
          alert('Yeh ID pehle se use ho rahi hai! Kuch naya naam rakho.');
        } else {
          throw error;
        }
      } else {
        alert('Mubarak ho! Link cloud main successfully save ho gaya.');
        document.getElementById('articleId').value = '';
        document.getElementById('articleTitle').value = '';
        document.getElementById('destUrl').value = '';
        loadLinks();
      }
    } catch (err) {
      alert('Error creating link: ' + err.message);
    }
  }

  // Delete link from Supabase Cloud
  async function deleteCloudLink(id) {
    if(confirm('Kya aap sach mein yeh link database se delete karna chahte hain?')) {
      try {
        const { error } = await _supabase
          .from('noxcent_links')
          .delete()
          .eq('id', id);

        if(error) throw error;
        alert('Link successfully wiped out from database!');
        loadLinks();
      } catch (err) {
        alert('Error deleting link: ' + err.message);
      }
    }
  }

  // Run on page load
  loadLinks();
</script>
</body>
</html>
